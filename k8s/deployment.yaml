apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowbridge-service
  namespace: backend
  labels:
    app.kubernetes.io/name: flowbridge-service
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flowbridge-service
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flowbridge-service
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: flowbridge-service
          image: harbor.deepwisdomai.com/deepwisdom/flowbridge:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: flowbridge-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowbridge-service-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: flowbridge-service-secrets
                  key: REDIS_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowbridge-service-secrets
                  key: API_KEY
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowbridge-service-secrets
                  key: FEISHU_APP_SECRET
            - name: FEISHU_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowbridge-service-secrets
                  key: FEISHU_WEBHOOK_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
